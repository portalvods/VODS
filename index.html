<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #090e1a; --card-dark: #111827; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f3f4f6; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #fef3c7; color: #92400e; }
        .status-analise { background: #dbeafe; color: #1e40af; }
        .status-concluido { background: #dcfce7; color: #166534; }
        .status-rejeitado { background: #fee2e2; color: #991b1b; }
        .input-dark { background: #1f2937; border: 1px solid #374151; color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        .card-animate { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .urgente { border: 2px solid #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .swal2-popup { background: #111827 !important; color: #fff !important; border-radius: 24px !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <script>
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 
        
        let currentItem = {};
        let searchMode = 'movie';
        let allPedidos = {}; 
        let currentFilter = 'Tudo';
        let currentUserLogado = null;
        let tempWppForOTP = null; 
        let authFluxo = 'registro';
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6 hidden">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
            <p id="user-display" class="text-slate-500 font-medium italic text-sm mt-1"></p>
        </div>
        <nav class="flex flex-wrap justify-center gap-2 glass p-1.5 rounded-2xl shadow-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2.5 rounded-xl text-sm font-bold bg-blue-600 hover:bg-blue-700 transition hidden"><i class="fas fa-shield-alt mr-1"></i> Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2.5 rounded-xl text-sm font-bold text-red-400 hover:bg-red-500/20 transition"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-10 card-animate">
        <div class="glass p-10 rounded-[40px] shadow-2xl text-center">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500 mb-2">PORTAL<span class="text-white">VOD</span></h1>
            <div id="form-login" class="space-y-4">
                <input type="tel" id="loginWpp" placeholder="WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 rounded-2xl font-black">ENTRAR</button>
            </div>
        </div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-blue-500"><i class="fas fa-shield-alt mr-2 text-white"></i> PAINEL ADMIN</h2>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl border-l-4 border-blue-500"><p class="text-slate-400 text-xs font-bold uppercase">Total</p><h3 id="stat-total" class="text-2xl font-black">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-yellow-500"><p class="text-slate-400 text-xs font-bold uppercase">Análise</p><h3 id="stat-analise" class="text-2xl font-black text-yellow-500">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-green-500"><p class="text-slate-400 text-xs font-bold uppercase">Concluídos</p><h3 id="stat-concluido" class="text-2xl font-black text-green-500">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-red-500"><p class="text-slate-400 text-xs font-bold uppercase">Rejeitados</p><h3 id="stat-rejeitado" class="text-2xl font-black text-red-500">0</h3></div>
        </div>

        <div class="glass p-6 rounded-[32px] mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-6">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterAdmin('Tudo')" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold text-white hover:bg-slate-700 transition">Tudo</button>
                    <button onclick="filterAdmin('Conserto')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500/30 transition">Consertos</button>
                    <button onclick="filterAdmin('Pendente')" class="bg-yellow-500/20 text-yellow-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-yellow-500/30 transition">Pendentes</button>
                    <button onclick="filterAdmin('Em Análise')" class="bg-blue-500/20 text-blue-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-500/30 transition">Análise</button>
                    <button onclick="filterAdmin('Rejeitado')" class="bg-rose-500/20 text-rose-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-rose-500/30 transition">Rejeitados</button>
                    <button onclick="filterAdmin('Concluído')" class="bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-green-500/30 transition">Concluídos</button>
                </div>
                <input type="text" id="adminSearch" onkeyup="loadAdmin()" placeholder="Buscar por nome ou whatsapp..." class="input-dark p-3 rounded-xl text-xs w-full md:w-64">
            </div>
        </div>

        <div class="glass rounded-[32px] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/60 text-slate-500 uppercase text-[10px] font-black">
                    <tr><th class="p-6">Conteúdo / Obs</th><th class="p-6">Solicitante</th><th class="p-6">Status</th><th class="p-6 text-center">Ações</th></tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <script>
        // LÓGICA DE LOGIN E INICIALIZAÇÃO
        window.onload = () => {
            const savedUser = localStorage.getItem('vod_user');
            if(savedUser) {
                currentUserLogado = JSON.parse(savedUser);
                ativarModoLogado();
            }
        };

        async function loginApp() {
            const wpp = document.getElementById('loginWpp').value;
            const res = await fetch(`${USERS_URL}/${wpp}.json`);
            const user = await res.json();
            if(user) {
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
            }
        }

        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            if(currentUserLogado.wpp === ADMIN_WPP) {
                document.getElementById('btn-nav-admin').classList.remove('hidden');
                showPage('admin');
            } else { showPage('cliente'); }
        }

        function showPage(page) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            if(page === 'admin') loadAdmin();
        }

        // --- A PARTE QUE VOCÊ PEDIU: FILTROS DO ADMIN ---
        function filterAdmin(status) {
            currentFilter = status;
            loadAdmin();
        }

        async function loadAdmin() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            allPedidos = data;
            
            const table = document.getElementById('admin-table');
            const searchTerm = document.getElementById('adminSearch').value.toLowerCase();
            
            let html = '';
            let count = { total: 0, analise: 0, concluido: 0, rejeitado: 0 };

            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                
                // Contadores para os cards do topo
                count.total++;
                if(p.status === 'Em Análise') count.analise++;
                if(p.status === 'Concluído') count.concluido++;
                if(p.status === 'Rejeitado') count.rejeitado++;

                // Lógica de Filtro por Botão e Busca
                const matchFilter = currentFilter === 'Tudo' || 
                                   (currentFilter === 'Conserto' && p.tipo === 'Conserto') || 
                                   (p.status === currentFilter);
                
                const matchSearch = p.nomeConteudo.toLowerCase().includes(searchTerm) || 
                                   p.userWpp.includes(searchTerm);

                if(matchFilter && matchSearch) {
                    html += `
                        <tr class="${p.tipo === 'Conserto' ? 'urgente' : ''}">
                            <td class="p-6 font-bold text-sm">${p.nomeConteudo} <br><span class="text-[10px] text-slate-500 uppercase">${p.tipo}</span></td>
                            <td class="p-6 text-xs">${p.userName}<br><span class="text-blue-500 font-bold">${p.userWpp}</span></td>
                            <td class="p-6"><span class="status-badge status-${p.status.toLowerCase().replace(' ', '-')}">${p.status}</span></td>
                            <td class="p-6 text-center">
                                <button onclick="updateStatus('${id}', 'Em Análise')" class="text-blue-500 mx-1"><i class="fas fa-search"></i></button>
                                <button onclick="updateStatus('${id}', 'Concluído')" class="text-green-500 mx-1"><i class="fas fa-check"></i></button>
                                <button onclick="updateStatus('${id}', 'Rejeitado')" class="text-red-500 mx-1"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>`;
                }
            });

            table.innerHTML = html;
            
            // Atualiza os números nos cards lá no topo
            document.getElementById('stat-total').innerText = count.total;
            document.getElementById('stat-analise').innerText = count.analise;
            document.getElementById('stat-concluido').innerText = count.concluido;
            document.getElementById('stat-rejeitado').innerText = count.rejeitado;
        }

        async function updateStatus(id, newStatus) {
            await fetch(`${DB_BASE}/pedidos/${id}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ status: newStatus })
            });
            loadAdmin();
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }
    </script>
</body>
</html>
