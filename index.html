<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #090e1a; --card-dark: #111827; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f3f4f6; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #fef3c7; color: #92400e; }
        .status-analise { background: #dbeafe; color: #1e40af; }
        .status-concluido { background: #dcfce7; color: #166534; }
        .status-rejeitado { background: #fee2e2; color: #991b1b; }
        .input-dark { background: #1f2937; border: 1px solid #374151; color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        
        .card-animate { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .exit-animate { animation: slideOut 0.4s ease forwards; pointer-events: none; }
        @keyframes slideOut { 0% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(30px); max-height: 0; } }

        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .hover-scale { transition: transform 0.2s ease; }
        .hover-scale:hover { transform: scale(1.02); }

        .urgente { border: 2px solid #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .swal2-popup { background: #111827 !important; color: #fff !important; border-radius: 24px !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <script>
        // CONFIGURAÇÕES BASE
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 

        // CONFIGURAÇÃO DA SUA API DE WHATSAPP (A QUE VOCÊ CONECTA O QR CODE)
        const WHATSAPP_API_URL = 'SUA_URL_DA_API_AQUI'; // Ex: https://suapi.com/message/send
        const WHATSAPP_TOKEN = 'SEU_TOKEN_AQUI';

        let currentItem = {};
        let searchMode = 'movie';
        let allPedidos = {}; 
        let currentUserLogado = null;
        let tempWppForOTP = null; 

        // FUNÇÃO DE ENVIO AUTOMÁTICO (CHAMADA NO REGISTRO E LOGIN)
        async function dispararWhatsApp(numero, codigo) {
            console.log(`Enviando código ${codigo} para ${numero}...`);
            const msg = `Seu código de acesso Portal VOD: ${codigo}`;
            
            try {
                // Tenta enviar via API (Método POST - Padrão de APIs de QR Code)
                await fetch(WHATSAPP_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${WHATSAPP_TOKEN}` },
                    body: JSON.stringify({ number: numero, message: msg })
                });
            } catch (e) {
                // Backup caso a API falhe: Abre o link direto
                console.error("Erro na API, usando backup link");
                window.open(`https://api.whatsapp.com/send?phone=55${numero}&text=${encodeURIComponent(msg)}`, '_blank');
            }
        }
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6 hidden card-animate">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
            <p id="user-display" class="text-slate-500 font-medium italic text-sm mt-1"></p>
        </div>
        <nav class="flex flex-wrap justify-center gap-2 glass p-1.5 rounded-2xl shadow-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2.5 rounded-xl text-sm font-bold bg-blue-600 hover:bg-blue-700 transition hidden">Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2.5 rounded-xl text-sm font-bold text-red-400 hover:bg-red-500/20 transition"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-10 card-animate">
        <div class="glass p-10 rounded-[40px] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-blue-500 mb-8">PORTAL<span class="text-white">VOD</span></h1>
            
            <div id="form-login" class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuário ou WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Sua Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 rounded-2xl font-black hover:bg-blue-700 transition">ENTRAR</button>
                <button onclick="toggleAuthMode('register')" class="text-sm text-blue-500 font-bold mt-4">Criar nova conta</button>
            </div>

            <div id="form-register" class="space-y-4 hidden">
                <input type="text" id="regUser" placeholder="Usuário" class="w-full input-dark p-4 rounded-2xl">
                <input type="text" id="regName" placeholder="Seu Nome" class="w-full input-dark p-4 rounded-2xl">
                <input type="tel" id="regWpp" placeholder="WhatsApp com DDD" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="regPass" placeholder="Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="registerApp()" class="w-full py-4 bg-green-600 rounded-2xl font-black">CADASTRAR</button>
                <button onclick="toggleAuthMode('login')" class="text-sm text-slate-400 mt-4">Já tenho conta</button>
            </div>
        </div>
    </main>

    <main id="page-otp" class="container mx-auto max-w-md mt-10 card-animate hidden">
        <div class="glass p-10 rounded-[40px] text-center">
            <i class="fab fa-whatsapp text-5xl text-green-500 mb-4"></i>
            <h2 class="text-2xl font-black mb-2">Verifique seu Whats</h2>
            <p id="otp-msg" class="text-slate-400 text-sm mb-8"></p>
            <input type="text" id="otpCode" placeholder="000000" class="w-full input-dark p-4 rounded-2xl text-center text-2xl font-black tracking-widest">
            <button onclick="verifyOTP()" class="w-full py-4 bg-green-600 rounded-2xl font-black mt-4">VALIDAR</button>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl hidden card-animate">
        <div class="glass p-8 rounded-[32px] mb-8">
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Pesquisar..." class="w-full input-dark p-5 rounded-2xl">
        </div>
        <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </main>

    <main id="page-status" class="container mx-auto max-w-2xl hidden card-animate">
        <div class="glass p-10 rounded-[32px]">
            <h2 class="text-3xl font-black mb-8">Meus Pedidos</h2>
            <div id="track-results" class="space-y-5"></div>
        </div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl hidden card-animate">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-blue-500">ADMINISTRAÇÃO</h2>
            <button onclick="verTodosUsuarios()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold">LISTAR CLIENTES</button>
        </div>
        <div class="glass rounded-[32px] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-slate-500 text-[10px] font-black uppercase">
                    <tr><th class="p-6">Conteúdo</th><th class="p-6">Solicitante</th><th class="p-6">Status</th><th class="p-6 text-center">Ação</th></tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div id="modal-content" class="glass rounded-[40px] max-w-md w-full p-10 text-center">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-3xl mb-6 mx-auto"></div>
            <h3 class="text-2xl font-black mb-8" id="modalTitle"></h3>
            <select id="requestType" class="w-full input-dark p-4 rounded-2xl mb-4">
                <option value="Adição">🎬 Solicitar Adição</option>
                <option value="Conserto">🛠️ Relatar Problema</option>
            </select>
            <textarea id="userObs" placeholder="Observações..." class="w-full input-dark p-4 rounded-2xl h-24 mb-4"></textarea>
            <button onclick="saveToFirebase()" class="w-full py-5 bg-blue-600 rounded-[24px] font-black">ENVIAR AGORA</button>
            <button onclick="closeModal()" class="mt-4 text-slate-500">Cancelar</button>
        </div>
    </div>

    <script>
        // LOGICA DE INICIALIZAÇÃO E TELAS
        window.onload = () => {
            const savedUser = localStorage.getItem('vod_user');
            if(savedUser) { currentUserLogado = JSON.parse(savedUser); ativarModoLogado(); }
        };

        function toggleAuthMode(mode) {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById(`form-${mode}`).classList.remove('hidden');
        }

        function showPage(p) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            if(p === 'admin') loadAdmin();
            if(p === 'status') trackRequests();
        }

        // LOGICA DE AUTH
        async function registerApp() {
            const username = document.getElementById('regUser').value.trim().toLowerCase();
            const nome = document.getElementById('regName').value.trim();
            const wpp = document.getElementById('regWpp').value.replace(/\D/g,'');
            const senha = document.getElementById('regPass').value;
            
            if(!username || !nome || wpp.length < 10) return Swal.fire('Erro', 'Preencha tudo', 'error');

            const codigoOTP = Math.floor(100000 + Math.random() * 900000).toString();
            await fetch(`${USERS_URL}/${wpp}.json`, {
                method: 'PUT',
                body: JSON.stringify({ username, nome, wpp, senha, codigo: codigoOTP, verificado: false })
            });

            tempWppForOTP = wpp;
            dispararWhatsApp(wpp, codigoOTP); // ENVIO AUTOMÁTICO

            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-otp').classList.remove('hidden');
            document.getElementById('otp-msg').innerText = `Código enviado para o WhatsApp final ${wpp.slice(-4)}`;
        }

        async function loginApp() {
            const userInp = document.getElementById('loginUser').value.trim().toLowerCase();
            const senhaInp = document.getElementById('loginPass').value;
            const res = await fetch(`${USERS_URL}.json`);
            const allUsers = await res.json() || {};
            const user = Object.values(allUsers).find(u => u.username === userInp || u.wpp === userInp);
            
            if(user && user.senha === senhaInp) {
                if(!user.verificado) {
                    tempWppForOTP = user.wpp;
                    dispararWhatsApp(user.wpp, user.codigo);
                    document.getElementById('page-auth').classList.add('hidden');
                    document.getElementById('page-otp').classList.remove('hidden');
                } else {
                    currentUserLogado = user;
                    localStorage.setItem('vod_user', JSON.stringify(user));
                    ativarModoLogado();
                }
            } else { Swal.fire('Erro', 'Credenciais inválidas', 'error'); }
        }

        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            const res = await fetch(`${USERS_URL}/${tempWppForOTP}.json`);
            const user = await res.json();
            if(user && user.codigo === code) {
                await fetch(`${USERS_URL}/${tempWppForOTP}.json`, { method: 'PATCH', body: JSON.stringify({ verificado: true }) });
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
                document.getElementById('page-otp').classList.add('hidden');
            } else { Swal.fire('Erro', 'Código incorreto', 'error'); }
        }

        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `Bem-vindo, <b>${currentUserLogado.nome}</b>`;
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
            showPage('cliente');
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }

        // BUSCA E PEDIDOS
        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            const grid = document.getElementById('grid-content');
            grid.innerHTML = data.results.filter(i => i.poster_path).map(i => `
                <div class="glass p-4 rounded-[32px] hover-scale">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full h-64 object-cover rounded-2xl mb-4 shadow-md">
                    <h4 class="font-bold text-xs truncate mb-3">${i.title || i.name}</h4>
                    <button onclick="openModal('${(i.title || i.name).replace(/'/g, "")}', 'https://image.tmdb.org/t/p/w500${i.poster_path}')" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-black uppercase">Pedir</button>
                </div>`).join('');
        }

        function openModal(name, img) {
            currentItem = { name, img };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover rounded-3xl">`;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveToFirebase() {
            const obs = document.getElementById('userObs').value;
            const type = document.getElementById('requestType').value;
            await fetch(DATABASE_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    ...currentItem, user: currentUserLogado.nome, wpp: currentUserLogado.wpp, 
                    type, obs, status: 'Pendente', date: new Date().toLocaleString('pt-BR') 
                }) 
            });
            Swal.fire('Enviado!', 'Seu pedido está na fila.', 'success');
            closeModal();
        }

        async function trackRequests() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const container = document.getElementById('track-results');
            container.innerHTML = Object.values(data).filter(p => p.wpp === currentUserLogado.wpp).reverse().map(p => `
                <div class="glass p-5 rounded-3xl flex items-center gap-5">
                    <img src="${p.img}" class="w-14 h-20 rounded-xl object-cover">
                    <div><b class="text-white">${p.name}</b><br><span class="status-badge status-${p.status.toLowerCase()}">${p.status}</span></div>
                </div>`).join('');
        }

        async function loadAdmin() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const table = document.getElementById('admin-table');
            table.innerHTML = Object.keys(data).reverse().map(id => {
                const p = data[id];
                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-6 flex gap-4 items-center">
                        <img src="${p.img}" class="w-10 h-14 rounded object-cover shadow-lg">
                        <span class="text-xs font-bold">${p.name}</span>
                    </td>
                    <td class="p-6 text-[10px] text-slate-400">${p.user}<br>${p.wpp}</td>
                    <td class="p-6">
                        <select onchange="updateStatus('${id}', this.value)" class="bg-slate-800 text-[10px] p-2 rounded-lg">
                            <option value="Pendente" ${p.status==='Pendente'?'selected':''}>Pendente</option>
                            <option value="Concluído" ${p.status==='Concluído'?'selected':''}>Concluído</option>
                        </select>
                    </td>
                    <td class="p-6 text-center">
                        <button onclick="deletePedido('${id}')" class="text-slate-600 hover:text-red-500 transition"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateStatus(id, status) {
            await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'PATCH', body: JSON.stringify({ status }) });
        }

        async function deletePedido(id) {
            await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'DELETE' });
            loadAdmin();
        }

        async function verTodosUsuarios() {
            const res = await fetch(`${USERS_URL}.json`);
            const users = await res.json() || {};
            let lista = Object.values(users).map(u => `<div class="text-left text-[10px] mb-2 p-2 bg-white/5 rounded"><b>${u.nome}</b> - ${u.wpp} (Code: ${u.codigo})</div>`).join('');
            Swal.fire({ title: 'Base de Clientes', html: `<div class="max-h-60 overflow-y-auto">${lista}</div>` });
        }
    </script>
</body>
</html>
