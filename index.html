<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #090e1a; --card-dark: #111827; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f3f4f6; margin: 0; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #fef3c7; color: #92400e; }
        .status-analise { background: #dbeafe; color: #1e40af; }
        .status-concluido { background: #dcfce7; color: #166534; }
        .status-rejeitado { background: #fee2e2; color: #991b1b; }
        .input-dark { background: #1f2937; border: 1px solid #374151; color: white; }
        .urgente { border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <script>
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 
        
        let currentItem = {};
        let searchMode = 'movie'; 
        let currentUserLogado = null;
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6 hidden">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
            <p id="user-display" class="text-slate-500 font-medium italic text-sm mt-1"></p>
        </div>
        <nav class="flex flex-wrap justify-center gap-2 glass p-1.5 rounded-2xl shadow-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Fazer Pedido</button>
            <button onclick="showPage('status')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Acompanhar</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2.5 rounded-xl text-sm font-bold bg-blue-600 hover:bg-blue-700 transition hidden">Painel Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2.5 rounded-xl text-sm font-bold text-red-400">Sair</button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-10">
        <div class="glass p-10 rounded-[40px] text-center">
            <h1 class="text-4xl font-black text-blue-500 mb-6 uppercase">Entrar</h1>
            <div class="space-y-4">
                <input type="tel" id="loginWpp" placeholder="Seu WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Sua Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 rounded-2xl font-black hover:bg-blue-700 transition">ACESSAR PORTAL</button>
            </div>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl hidden">
        <div class="glass p-8 rounded-[32px] mb-8">
            <div class="flex gap-6 mb-8 border-b border-slate-800 pb-4">
                <button onclick="setSearchMode('movie')" id="btn-movie" class="text-blue-500 font-bold border-b-2 border-blue-500 pb-2">Filmes & Séries</button>
                <button onclick="setSearchMode('tv')" id="btn-tv" class="text-slate-500 font-bold pb-2">Canais ao Vivo</button>
            </div>
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Digite o nome do conteúdo..." class="w-full input-dark p-5 rounded-2xl">
            </div>
        </div>
        <div id="grid-content" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
    </main>

    <main id="page-status" class="container mx-auto max-w-2xl hidden">
        <div class="glass p-10 rounded-[32px]">
            <h2 class="text-3xl font-black mb-6">Status dos Pedidos</h2>
            <div id="track-results" class="space-y-4"></div>
        </div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl hidden">
        <h2 class="text-3xl font-black text-blue-500 mb-8 uppercase">Gerenciamento de Pedidos</h2>
        <div class="glass rounded-[32px] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/60 text-slate-500 text-[10px] font-black uppercase">
                    <tr><th class="p-6">Conteúdo</th><th class="p-6">Solicitante</th><th class="p-6">Status</th><th class="p-6">Ações</th></tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="glass rounded-[40px] max-w-md w-full p-10">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-3xl mb-6 mx-auto overflow-hidden"></div>
            <h3 class="text-2xl font-black text-center mb-8" id="modalTitle"></h3>
            <div class="space-y-4">
                <select id="requestType" class="w-full input-dark p-4 rounded-2xl">
                    <option value="Adição">🎬 Solicitar Adição</option>
                    <option value="Conserto">🛠️ Relatar Problema</option>
                </select>
                <textarea id="userObs" placeholder="Ex: Adicionar dublado, temporada 2, etc..." class="w-full input-dark p-4 rounded-2xl h-24"></textarea>
                <button onclick="saveToFirebase()" class="w-full py-5 bg-blue-600 rounded-[24px] font-black hover:bg-blue-700 transition">ENVIAR SOLICITAÇÃO</button>
                <button onclick="closeModal()" class="w-full text-slate-500 font-bold mt-4">FECHAR</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedUser = localStorage.getItem('vod_user');
            if(savedUser) {
                currentUserLogado = JSON.parse(savedUser);
                ativarModoLogado();
            }
        };

        async function loginApp() {
            const wpp = document.getElementById('loginWpp').value;
            const senha = document.getElementById('loginPass').value;
            if(!wpp) return;
            const res = await fetch(`${USERS_URL}/${wpp}.json`);
            const user = await res.json();
            if(user && user.senha === senha) {
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
            } else { Swal.fire('Erro', 'Dados incorretos!', 'error'); }
        }

        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `Logado como: <b>${currentUserLogado.nome}</b>`;
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
            showPage('cliente');
        }

        function showPage(page) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            if(page === 'admin') loadAdmin();
            if(page === 'status') trackRequests();
        }

        function setSearchMode(mode) {
            searchMode = mode;
            document.getElementById('btn-movie').className = mode === 'movie' ? 'text-blue-500 font-bold border-b-2 border-blue-500 pb-2' : 'text-slate-500 font-bold pb-2';
            document.getElementById('btn-tv').className = mode === 'tv' ? 'text-blue-500 font-bold border-b-2 border-blue-500 pb-2' : 'text-slate-500 font-bold pb-2';
            document.getElementById('grid-content').innerHTML = '';
            document.getElementById('searchInput').value = '';
        }

        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            // Filtra por 'tv' para canais/series de tv e 'multi' para o geral
            const endpoint = searchMode === 'tv' ? 'search/tv' : 'search/multi';
            const res = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            
            document.getElementById('grid-content').innerHTML = data.results.filter(i => i.poster_path || i.profile_path).map(item => {
                const title = item.title || item.name;
                const img = `https://image.tmdb.org/t/p/w500${item.poster_path || item.profile_path}`;
                return `<div onclick="openModal('${title.replace(/'/g, "")}', '${img}')" class="glass rounded-[32px] overflow-hidden cursor-pointer hover:scale-105 transition border border-transparent hover:border-blue-500/50">
                    <img src="${img}" class="w-full h-64 object-cover">
                    <div class="p-4"><h4 class="font-bold text-xs truncate uppercase">${title}</h4></div>
                </div>`;
            }).join('');
        }

        function openModal(title, img) {
            currentItem = { title, img };
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover">`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveToFirebase() {
            const pedido = {
                userName: currentUserLogado.nome,
                userWpp: currentUserLogado.wpp,
                nomeConteudo: currentItem.title,
                tipo: document.getElementById('requestType').value,
                obs: document.getElementById('userObs').value,
                status: 'Pendente',
                data: new Date().toISOString()
            };
            await fetch(DATABASE_URL, { method: 'POST', body: JSON.stringify(pedido) });
            Swal.fire('Sucesso!', 'Seu pedido foi enviado ao administrador.', 'success');
            closeModal();
        }

        async function loadAdmin() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const table = document.getElementById('admin-table');
            const keys = Object.keys(data).reverse();
            table.innerHTML = keys.map(id => {
                const p = data[id];
                return `<tr class="${p.tipo === 'Conserto' ? 'urgente' : ''}">
                    <td class="p-6 font-bold text-sm">${p.nomeConteudo} <br><span class="text-[10px] text-slate-500 uppercase">${p.tipo}</span></td>
                    <td class="p-6 text-xs">${p.userName}<br><span class="text-blue-500 font-bold">${p.userWpp}</span></td>
                    <td class="p-6"><span class="status-badge status-${p.status.toLowerCase().replace(' ', '-')}">${p.status}</span></td>
                    <td class="p-6">
                        <button onclick="updateStatus('${id}', 'Concluído')" class="text-green-500 mr-3"><i class="fas fa-check"></i></button>
                        <button onclick="updateStatus('${id}', 'Rejeitado')" class="text-red-500"><i class="fas fa-times"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateStatus(id, newStatus) {
            await fetch(`${DB_BASE}/pedidos/${id}.json`, { method: 'PATCH', body: JSON.stringify({ status: newStatus }) });
            loadAdmin();
        }

        async function trackRequests() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const results = Object.values(data).filter(p => p.userWpp === currentUserLogado.wpp).reverse();
            document.getElementById('track-results').innerHTML = results.map(p => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center border-l-4 ${p.status === 'Concluído' ? 'border-green-500' : 'border-blue-500'}">
                    <div><h4 class="font-bold">${p.nomeConteudo}</h4><p class="text-xs text-slate-500 uppercase">${p.tipo}</p></div>
                    <span class="status-badge status-${p.status.toLowerCase().replace(' ', '-')}">${p.status}</span>
                </div>
            `).join('') || '<p class="text-center text-slate-500">Você ainda não fez nenhum pedido.</p>';
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }
    </script>
</body>
</html>
