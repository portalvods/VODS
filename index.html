<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #020617; --card-dark: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; margin: 0; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: 0.3s; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #78350f; color: #fef3c7; }
        .status-analise { background: #1e40af; color: #dbeafe; }
        .status-concluido { background: #064e3b; color: #dcfce7; }
        .status-rejeitado { background: #7f1d1d; color: #fee2e2; }
        .btn-filter { padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
        #f-Todos { background: #475569; }
        #f-Pendente { background: #78350f; }
        #f-Análise { background: #1e40af; }
        #f-Concluído { background: #166534; }
        #f-Rejeitado { background: #991b1b; }
        .active-filter { border: 2px solid white !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .stat-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
    </style>
</head>
<body>

    <script>
        // Configurações Globais
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 

        let currentUserLogado = null;
        let searchMode = 'movie'; 
        let currentItem = {};
        let currentFilter = 'Todos';

        window.onload = () => {
            const saved = localStorage.getItem('vod_user');
            if(saved) { 
                currentUserLogado = JSON.parse(saved); 
                ativarModoLogado(sessionStorage.getItem('last_page') || 'cliente'); 
            }
        };

        function ativarModoLogado(page = 'cliente') {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
            showPage(page);
        }

        function showPage(p) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            sessionStorage.setItem('last_page', p);
            if(p === 'admin') loadAdmin();
            if(p === 'status') trackRequests();
        }

        // --- FUNÇÕES DE CARREGAMENTO (O CORAÇÃO DO PROBLEMA) ---

        async function loadAdmin() {
            const table = document.getElementById('admin-table');
            const rankingList = document.getElementById('ranking-list');
            
            try {
                const res = await fetch(DATABASE_URL);
                const data = await res.json();
                
                if(!data) {
                    table.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-500">Nenhum pedido encontrado no banco.</td></tr>';
                    return;
                }

                let stats = { total: 0, pendente: 0, analise: 0, concluido: 0, rejeitado: 0 };
                let ranking = {};

                const html = Object.keys(data).reverse().map(id => {
                    const p = data[id];
                    stats.total++;
                    
                    // Contagem de Stats
                    const stNormal = p.status.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if(stNormal === 'pendente') stats.pendente++;
                    else if(stNormal === 'analise') stats.analise++;
                    else if(stNormal === 'concluido') stats.concluido++;
                    else if(stNormal === 'rejeitado') stats.rejeitado++;

                    // Ranking
                    ranking[p.name] = (ranking[p.name] || 0) + 1;

                    // Filtro visual
                    if (currentFilter !== 'Todos' && p.status !== currentFilter) return '';

                    return `
                        <tr class="hover:bg-white/5 transition">
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <img src="${p.img}" class="w-10 h-14 rounded-lg object-cover shadow-lg">
                                    <div class="text-[11px] font-bold leading-tight">${p.name}</div>
                                </div>
                            </td>
                            <td class="p-4 text-[10px] font-bold">
                                <span class="text-white">${p.user}</span><br>
                                <span class="text-blue-400">${p.wpp}</span>
                            </td>
                            <td class="p-4 text-[10px] text-slate-400">${p.date}<br>${p.time || ''}</td>
                            <td class="p-4">
                                <select onchange="updateStatus('${id}', this.value)" class="bg-slate-800 text-[10px] p-2 rounded-lg border border-white/10 outline-none">
                                    <option value="Pendente" ${p.status==='Pendente'?'selected':''}>Pendente</option>
                                    <option value="Análise" ${p.status==='Análise'?'selected':''}>Análise</option>
                                    <option value="Concluído" ${p.status==='Concluído'?'selected':''}>Concluído</option>
                                    <option value="Rejeitado" ${p.status==='Rejeitado'?'selected':''}>Rejeitado</option>
                                </select>
                            </td>
                            <td class="p-4 text-center">
                                ${p.obs ? `<button onclick="Swal.fire('Obs', '${p.obs.replace(/'/g, "\\'")}', 'info')" class="text-amber-400"><i class="fas fa-comment-dots"></i></button>` : '-'}
                            </td>
                            <td class="p-4 text-center space-x-2">
                                ${p.photo ? `<button onclick="verFoto('${p.photo}')" class="text-blue-400"><i class="fas fa-image"></i></button>` : ''}
                                <button onclick="deletePedido('${id}')" class="text-red-500/50 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                }).join('');

                table.innerHTML = html || '<tr><td colspan="6" class="p-10 text-center text-slate-500">Sem pedidos para este filtro.</td></tr>';
                
                // Atualiza contadores
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-pendente').innerText = stats.pendente;
                document.getElementById('stat-analise').innerText = stats.analise;
                document.getElementById('stat-concluido').innerText = stats.concluido;
                document.getElementById('stat-rejeitado').innerText = stats.rejeitado;

                // Atualiza Ranking
                const sorted = Object.entries(ranking).sort((a,b) => b[1] - a[1]).slice(0, 5);
                rankingList.innerHTML = sorted.map(([name, count]) => `
                    <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl text-[10px] font-bold">
                        <span class="truncate pr-2">${name}</span>
                        <span class="text-blue-500">${count}x</span>
                    </div>`).join('');

            } catch(e) { console.error("Erro Admin:", e); }
        }

        async function trackRequests() {
            const container = document.getElementById('track-results');
            container.innerHTML = '<p class="text-center text-slate-500 animate-pulse">Carregando seus pedidos...</p>';
            
            try {
                const res = await fetch(DATABASE_URL);
                const data = await res.json();
                
                if(!data) {
                    container.innerHTML = '<div class="glass p-10 rounded-3xl text-center text-slate-500">Você ainda não fez nenhum pedido.</div>';
                    return;
                }

                const meusPedidos = Object.values(data)
                    .filter(p => p.wpp === currentUserLogado.wpp)
                    .reverse();

                if(meusPedidos.length === 0) {
                    container.innerHTML = '<div class="glass p-10 rounded-3xl text-center text-slate-500">Nenhum pedido encontrado para o seu número.</div>';
                    return;
                }

                container.innerHTML = meusPedidos.map(p => {
                    const st = p.status.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    return `
                        <div class="glass p-4 rounded-[28px] flex items-center gap-4 mb-4 border border-white/5">
                            <img src="${p.img}" class="w-16 h-24 rounded-2xl object-cover shadow-2xl">
                            <div class="flex-1">
                                <h4 class="font-black text-white text-sm mb-1">${p.name}</h4>
                                <p class="text-[10px] text-slate-500 mb-3">${p.date} às ${p.time || '--:--'}</p>
                                <div class="inline-block status-badge status-${st}">${p.status}</div>
                            </div>
                        </div>`;
                }).join('');
            } catch(e) { container.innerHTML = "Erro ao carregar dados."; }
        }

        // --- RESTO DAS FUNÇÕES SUPORTE ---
        async function updateStatus(id, novoStatus) {
            await fetch(`${DB_BASE}/pedidos/${id}.json`, { method: 'PATCH', body: JSON.stringify({ status: novoStatus }) });
            loadAdmin();
        }

        async function deletePedido(id) {
            Swal.fire({ title: 'Excluir?', text: "Esta ação não pode ser desfeita!", icon: 'warning', showCancelButton: true }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch(`${DB_BASE}/pedidos/${id}.json`, { method: 'DELETE' });
                    loadAdmin();
                }
            });
        }

        function verFoto(img) { Swal.fire({ imageUrl: img, imageAlt: 'Anexo', showConfirmButton: false }); }

        function filterAdmin(st) { 
            currentFilter = st; 
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active-filter'));
            document.getElementById(`f-${st}`).classList.add('active-filter');
            loadAdmin(); 
        }

        async function loginApp() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const res = await fetch(`${USERS_URL}.json`);
            const users = await res.json() || {};
            const user = Object.values(users).find(x => (x.username === u || x.wpp === u) && x.senha === p);
            if(user) {
                currentUserLogado = user; 
                localStorage.setItem('vod_user', JSON.stringify(user)); 
                ativarModoLogado();
            } else { Swal.fire('Erro', 'Usuário ou senha incorretos', 'error'); }
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }

        // Pesquisa TMDB
        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            document.getElementById('grid-content').innerHTML = data.results.filter(i => i.poster_path).map(i => `
                <div class="glass p-3 rounded-[24px]">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full h-60 object-cover rounded-[20px] mb-3 shadow-xl">
                    <h4 class="font-bold text-[11px] truncate px-1">${i.title || i.name}</h4>
                    <button onclick="openModal('${(i.title || i.name).replace(/'/g, "")}', 'https://image.tmdb.org/t/p/w500${i.poster_path}')" class="w-full bg-blue-600/20 text-blue-400 py-3 rounded-xl text-[10px] font-black mt-3 hover:bg-blue-600 hover:text-white transition">SOLICITAR</button>
                </div>`).join('');
        }

        function openModal(name, img) { currentItem = { name, img }; document.getElementById('modalTitle').innerText = name; document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover rounded-2xl">`; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveToFirebase() {
            const agora = new Date();
            const data = { 
                ...currentItem, 
                user: currentUserLogado.nome, 
                wpp: currentUserLogado.wpp, 
                status: 'Pendente', 
                type: document.getElementById('requestType').value, 
                obs: document.getElementById('userObs').value,
                date: agora.toLocaleDateString('pt-BR'),
                time: agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            };
            await fetch(DATABASE_URL, { method: 'POST', body: JSON.stringify(data) });
            Swal.fire('Sucesso!', 'Pedido enviado.', 'success'); 
            closeModal();
            trackRequests();
        }
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center p-6 mb-4 gap-6 hidden">
        <h1 class="text-3xl font-black text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
        <nav class="flex gap-2 glass p-2 rounded-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2 rounded-xl text-xs font-bold bg-blue-600 hidden">Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2 rounded-xl text-xs font-bold text-red-400">Sair</button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-16 p-4">
        <div class="glass p-10 rounded-[40px] text-center border border-white/10">
            <h2 class="text-4xl font-black text-blue-500 mb-8 uppercase">Login</h2>
            <div class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuário ou WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 rounded-2xl font-black shadow-xl hover:scale-105 transition">ENTRAR</button>
            </div>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl p-6 hidden">
        <div class="glass p-8 rounded-[35px] mb-8">
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Pesquisar filme ou série..." class="w-full input-dark p-5 rounded-2xl text-lg">
        </div>
        <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <main id="page-status" class="container mx-auto max-w-2xl p-6 hidden text-center">
        <h2 class="text-3xl font-black mb-8">MEUS PEDIDOS</h2>
        <div id="track-results" class="space-y-4"></div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl p-6 hidden">
        <div id="admin-stats-container" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="stat-card"><p class="text-[10px] font-bold text-slate-400 uppercase">Total</p><h3 id="stat-total" class="text-3xl font-black">0</h3></div>
            <div class="stat-card"><p class="text-[10px] font-bold text-amber-500 uppercase">Pendentes</p><h3 id="stat-pendente" class="text-3xl font-black">0</h3></div>
            <div class="stat-card"><p class="text-[10px] font-bold text-blue-500 uppercase">Análise</p><h3 id="stat-analise" class="text-3xl font-black">0</h3></div>
            <div class="stat-card"><p class="text-[10px] font-bold text-green-500 uppercase">Concluídos</p><h3 id="stat-concluido" class="text-3xl font-black">0</h3></div>
            <div class="stat-card"><p class="text-[10px] font-bold text-red-500 uppercase">Rejeitados</p><h3 id="stat-rejeitado" class="text-3xl font-black">0</h3></div>
        </div>

        <div class="grid lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs font-black text-blue-400 uppercase mb-4">Mais Pedidos</h3>
                    <div id="ranking-list" class="space-y-2"></div>
                </div>
            </div>
            <div class="lg:col-span-3">
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="filterAdmin('Todos')" class="btn-filter active-filter" id="f-Todos">Todos</button>
                    <button onclick="filterAdmin('Pendente')" class="btn-filter" id="f-Pendente">Pendente</button>
                    <button onclick="filterAdmin('Análise')" class="btn-filter" id="f-Análise">Análise</button>
                    <button onclick="filterAdmin('Concluído')" class="btn-filter" id="f-Concluído">Concluído</button>
                    <button onclick="filterAdmin('Rejeitado')" class="btn-filter" id="f-Rejeitado">Rejeitados</button>
                </div>
                <div class="glass rounded-3xl overflow-hidden border border-white/5">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900/80 text-[10px] uppercase text-slate-500 font-black">
                            <tr><th class="p-4">Conteúdo</th><th class="p-4">Usuário</th><th class="p-4">Data</th><th class="p-4">Status</th><th class="p-4 text-center">Obs</th><th class="p-4 text-center">Ação</th></tr>
                        </thead>
                        <tbody id="admin-table" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass rounded-[40px] max-w-md w-full p-8 text-center border border-white/10">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-2xl mb-6 mx-auto overflow-hidden shadow-2xl"></div>
            <h3 class="text-xl font-black mb-6" id="modalTitle"></h3>
            <div class="space-y-4 text-left text-xs">
                <select id="requestType" class="w-full input-dark p-4 rounded-2xl">
                    <option value="🍿 Solicitar adição">🍿 Solicitar adição</option>
                    <option value="🎬 Solicitar atualização">🎬 Solicitar atualização</option>
                    <option value="👨🏻‍🔧 Relatar um problema">👨🏻‍🔧 Relatar um problema</option>
                </select>
                <textarea id="userObs" placeholder="Algum detalhe extra?" class="w-full input-dark p-4 rounded-2xl h-24"></textarea>
            </div>
            <button onclick="saveToFirebase()" class="w-full py-4 bg-blue-600 rounded-2xl font-black mt-6 hover:bg-blue-500">ENVIAR AGORA</button>
            <button onclick="closeModal()" class="mt-4 text-xs text-slate-500 font-bold uppercase">Cancelar</button>
        </div>
    </div>

</body>
</html>
