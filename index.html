<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #090e1a; --card-dark: #111827; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f3f4f6; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #fef3c7; color: #92400e; }
        .status-analise { background: #dbeafe; color: #1e40af; }
        .status-concluido { background: #dcfce7; color: #166534; }
        .status-rejeitado { background: #fee2e2; color: #991b1b; }
        .input-dark { background: #1f2937; border: 1px solid #374151; color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        .card-animate { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .urgente { border: 2px solid #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .swal2-popup { background: #111827 !important; color: #fff !important; border-radius: 24px !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <script>
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 
        
        let currentItem = {};
        let searchMode = 'movie';
        let allPedidos = null; // Começa nulo para forçar o primeiro fetch
        let currentUserLogado = null;
        let currentFilter = 'Tudo';
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6 hidden">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
            <p id="user-display" class="text-slate-500 font-medium italic text-sm mt-1"></p>
        </div>
        <nav class="flex flex-wrap justify-center gap-2 glass p-1.5 rounded-2xl shadow-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2.5 rounded-xl text-sm font-bold bg-blue-600 hover:bg-blue-700 transition hidden"><i class="fas fa-shield-alt mr-1"></i> Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2.5 rounded-xl text-sm font-bold text-red-400 hover:bg-red-500/20 transition"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-10 card-animate">
        <div class="glass p-10 rounded-[40px] shadow-2xl text-center">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500 mb-2">PORTAL<span class="text-white">VOD</span></h1>
            <div id="form-login" class="space-y-4">
                <input type="tel" id="loginWpp" placeholder="Seu WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Sua Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" id="btnLogin" class="w-full py-4 bg-blue-600 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">ENTRAR</button>
            </div>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl hidden">
        <div class="glass p-8 rounded-[32px] mb-8 shadow-2xl border-t-4 border-blue-500">
            <div class="flex gap-6 mb-8 border-b border-slate-800 pb-4">
                <button onclick="setSearchMode('movie')" id="btn-movie" class="text-blue-500 font-bold border-b-2 border-blue-500 pb-2">Filmes & Séries</button>
                <button onclick="setSearchMode('tv')" id="btn-tv" class="text-slate-500 font-bold pb-2">Canais ao Vivo</button>
            </div>
            <div class="relative"><i class="fas fa-search absolute left-5 top-5 text-slate-500"></i>
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Pesquisar..." class="w-full input-dark p-5 pl-14 rounded-2xl">
            </div>
        </div>
        <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </main>

    <main id="page-status" class="container mx-auto max-w-2xl hidden">
        <div class="glass p-10 rounded-[32px]">
            <h2 class="text-3xl font-black mb-2">Meus Pedidos</h2>
            <div id="track-results" class="space-y-5"></div>
        </div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-blue-500"><i class="fas fa-shield-alt mr-2 text-white"></i> PAINEL ADMIN</h2>
            <button onclick="loadAdmin(true)" class="bg-blue-600 p-3 rounded-xl text-xs font-bold"><i class="fas fa-sync mr-2"></i>ATUALIZAR DADOS</button>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl border-l-4 border-blue-500"><p class="text-slate-400 text-xs font-bold uppercase">Total</p><h3 id="stat-total" class="text-2xl font-black">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-yellow-500"><p class="text-slate-400 text-xs font-bold uppercase">Análise</p><h3 id="stat-analise" class="text-2xl font-black text-yellow-500">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-green-500"><p class="text-slate-400 text-xs font-bold uppercase">Concluídos</p><h3 id="stat-concluido" class="text-2xl font-black text-green-500">0</h3></div>
            <div class="glass p-6 rounded-3xl border-l-4 border-red-500"><p class="text-slate-400 text-xs font-bold uppercase">Rejeitados</p><h3 id="stat-rejeitado" class="text-2xl font-black text-red-500">0</h3></div>
        </div>

        <div class="glass p-6 rounded-[32px] mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterAdmin('Tudo')" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold text-white">Tudo</button>
                    <button onclick="filterAdmin('Conserto')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-xs font-bold">Consertos</button>
                    <button onclick="filterAdmin('Pendente')" class="bg-yellow-500/20 text-yellow-500 px-4 py-2 rounded-xl text-xs font-bold">Pendentes</button>
                    <button onclick="filterAdmin('Em Análise')" class="bg-blue-500/20 text-blue-500 px-4 py-2 rounded-xl text-xs font-bold">Análise</button>
                    <button onclick="filterAdmin('Concluído')" class="bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-xs font-bold">Concluídos</button>
                </div>
                <input type="text" id="adminSearch" onkeyup="renderAdminTable()" placeholder="Buscar..." class="input-dark p-3 rounded-xl text-xs w-full md:w-64">
            </div>
        </div>

        <div class="glass rounded-[32px] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/60 text-slate-500 uppercase text-[10px] font-black">
                    <tr><th class="p-6">Conteúdo</th><th class="p-6">Solicitante</th><th class="p-6">Status</th><th class="p-6 text-center">Ações</th></tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-xl">
        <div class="glass rounded-[40px] max-w-md w-full p-10 h-max">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-3xl mb-6 mx-auto overflow-hidden"></div>
            <h3 class="text-2xl font-black text-center mb-8" id="modalTitle"></h3>
            <div class="space-y-4">
                <select id="requestType" class="w-full input-dark p-4 rounded-2xl">
                    <option value="Adição">🎬 Solicitar Adição</option>
                    <option value="Conserto">🛠️ Relatar Problema</option>
                </select>
                <textarea id="userObs" placeholder="Observações..." class="w-full input-dark p-4 rounded-2xl h-24"></textarea>
                <button onclick="saveToFirebase()" class="w-full py-5 bg-blue-600 rounded-[24px] font-black">ENVIAR PEDIDO</button>
                <button onclick="closeModal()" class="w-full text-slate-500 font-bold mt-4">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedUser = localStorage.getItem('vod_user');
            if(savedUser) {
                currentUserLogado = JSON.parse(savedUser);
                ativarModoLogado();
            }
        };

        async function loginApp() {
            const wpp = document.getElementById('loginWpp').value;
            const senha = document.getElementById('loginPass').value;
            if(!wpp || !senha) return;
            const res = await fetch(`${USERS_URL}/${wpp}.json`);
            const user = await res.json();
            if(user && user.senha === senha) {
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
            } else { Swal.fire('Erro', 'Dados incorretos', 'error'); }
        }

        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `Olá, <b>${currentUserLogado.nome}</b>`;
            showPage(currentUserLogado.wpp === ADMIN_WPP ? 'admin' : 'cliente');
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
        }

        function showPage(page) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            if(page === 'admin') loadAdmin();
            if(page === 'status') trackRequests();
        }

        // --- CARREGAMENTO OTIMIZADO ---
        async function loadAdmin(force = false) {
            if(allPedidos && !force) { 
                renderAdminTable(); 
                return; 
            }
            
            const table = document.getElementById('admin-table');
            table.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-blue-500">Otimizando banco de dados...</td></tr>';
            
            try {
                const res = await fetch(DATABASE_URL);
                allPedidos = await res.json() || {};
                renderAdminTable();
                updateStats();
            } catch (e) { console.error(e); }
        }

        function filterAdmin(status) {
            currentFilter = status;
            renderAdminTable();
        }

        function renderAdminTable() {
            const table = document.getElementById('admin-table');
            const search = document.getElementById('adminSearch').value.toLowerCase();
            let html = '';
            
            const keys = Object.keys(allPedidos).reverse();
            
            keys.forEach(id => {
                const p = allPedidos[id];
                const matchesSearch = p.nomeConteudo.toLowerCase().includes(search) || p.userWpp.includes(search);
                const matchesFilter = currentFilter === 'Tudo' || p.status === currentFilter || (currentFilter === 'Conserto' && p.tipo === 'Conserto');

                if (matchesSearch && matchesFilter) {
                    html += `
                        <tr class="${p.tipo === 'Conserto' ? 'urgente' : ''}">
                            <td class="p-6">
                                <div class="font-bold">${p.nomeConteudo}</div>
                                <div class="text-[10px] text-slate-500 uppercase">${p.tipo}</div>
                            </td>
                            <td class="p-6">
                                <div class="text-sm font-medium">${p.userName}</div>
                                <div class="text-xs text-blue-500">${p.userWpp}</div>
                            </td>
                            <td class="p-6">
                                <span class="status-badge status-${p.status.toLowerCase().replace(' ', '-')}">${p.status}</span>
                            </td>
                            <td class="p-6 text-center space-x-2">
                                <button onclick="updateStatus('${id}', 'Em Análise')" class="text-blue-400"><i class="fas fa-search"></i></button>
                                <button onclick="updateStatus('${id}', 'Concluído')" class="text-green-500"><button onclick="updateStatus('${id}', 'Rejeitado')" class="text-red-500"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>
                    `;
                }
            });
            table.innerHTML = html || '<tr><td colspan="4" class="p-10 text-center text-slate-500">Nenhum pedido encontrado.</td></tr>';
        }

        async function updateStatus(id, newStatus) {
            await fetch(`${DB_BASE}/pedidos/${id}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ status: newStatus })
            });
            allPedidos[id].status = newStatus;
            renderAdminTable();
            updateStats();
        }

        function updateStats() {
            const vals = Object.values(allPedidos);
            document.getElementById('stat-total').innerText = vals.length;
            document.getElementById('stat-analise').innerText = vals.filter(p => p.status === 'Em Análise').length;
            document.getElementById('stat-concluido').innerText = vals.filter(p => p.status === 'Concluído').length;
            document.getElementById('stat-rejeitado').innerText = vals.filter(p => p.status === 'Rejeitado').length;
        }

        // --- FUNÇÕES DE PESQUISA E MODAL ---
        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            document.getElementById('grid-content').innerHTML = data.results.filter(i => i.poster_path).map(item => `
                <div onclick="openModal('${(item.title || item.name).replace(/'/g, "")}', 'https://image.tmdb.org/t/p/w500${item.poster_path}')" class="glass rounded-[32px] overflow-hidden cursor-pointer hover:scale-105 transition">
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" class="w-full h-64 object-cover">
                    <div class="p-4"><h4 class="font-bold text-xs truncate">${item.title || item.name}</h4></div>
                </div>
            `).join('');
        }

        function openModal(title, img) {
            currentItem = { title, img };
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover">`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveToFirebase() {
            const pedido = {
                userName: currentUserLogado.nome,
                userWpp: currentUserLogado.wpp,
                nomeConteudo: currentItem.title,
                tipo: document.getElementById('requestType').value,
                obs: document.getElementById('userObs').value,
                status: 'Pendente',
                data: new Date().toISOString()
            };
            await fetch(DATABASE_URL, { method: 'POST', body: JSON.stringify(pedido) });
            Swal.fire('Enviado!', 'Seu pedido foi registrado.', 'success');
            closeModal();
            allPedidos = null; // Reseta cache para carregar novo pedido
        }

        async function trackRequests() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            const html = Object.values(data).filter(p => p.userWpp === currentUserLogado.wpp).reverse().map(p => `
                <div class="glass p-5 rounded-3xl border-l-4 ${p.status === 'Concluído' ? 'border-green-500' : 'border-blue-500'}">
                    <div class="flex justify-between">
                        <div><h4 class="font-bold">${p.nomeConteudo}</h4><p class="text-xs text-slate-500">${p.tipo}</p></div>
                        <span class="status-badge status-${p.status.toLowerCase().replace(' ', '-')}">${p.status}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('track-results').innerHTML = html || '<p class="text-center text-slate-500">Nenhum pedido encontrado.</p>';
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }
        function setSearchMode(mode) { searchMode = mode; }
    </script>
</body>
</html>
