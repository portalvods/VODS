<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        /* RESTAURANDO O DARK MODE */
        :root { 
            --bg-dark: #020617; 
            --card-dark: #0f172a; 
            --accent: #3b82f6; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            margin: 0; 
            min-height: 100vh;
        }

        /* EFEITO GLASSMOPHISM */
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .input-dark { 
            background: #1e293b; 
            border: 1px solid #334155; 
            color: white; 
            transition: all 0.3s; 
        }

        .input-dark:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); 
            outline: none; 
        }

        /* BADGES DE STATUS */
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #78350f; color: #fef3c7; }
        .status-concluido { background: #064e3b; color: #dcfce7; }

        /* ANIMAÇÕES */
        .card-animate { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .urgente { border: 2px solid #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }

        .swal2-popup { background: #0f172a !important; color: #fff !important; border: 1px solid #334155 !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <script>
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 

        // CONFIGURAÇÃO DA SUA API DE WHATSAPP (QR CODE)
        const WHATSAPP_API_URL = 'SUA_URL_DA_API_AQUI'; 
        const WHATSAPP_TOKEN = 'SEU_TOKEN_AQUI';

        let currentUserLogado = null;
        let searchMode = 'movie';

        async function dispararWhatsApp(numero, codigo) {
            const msg = `Seu código de acesso Portal VOD: ${codigo}`;
            try {
                await fetch(WHATSAPP_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${WHATSAPP_TOKEN}` },
                    body: JSON.stringify({ number: numero, message: msg })
                });
            } catch (e) {
                window.open(`https://api.whatsapp.com/send?phone=55${numero}&text=${encodeURIComponent(msg)}`, '_blank');
            }
        }
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6 hidden card-animate">
        <div class="text-center md:text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
            <p id="user-display" class="text-slate-400 font-medium text-sm mt-1"></p>
        </div>
        <nav class="flex gap-2 glass p-2 rounded-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-700 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-700 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 hidden">Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2 rounded-xl text-sm font-bold text-red-400 hover:bg-red-900/30 transition">Sair</button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-20 card-animate">
        <div class="glass p-10 rounded-[40px] text-center border border-white/10">
            <h1 class="text-4xl font-black text-blue-500 mb-8">PORTAL<span class="text-white">VOD</span></h1>
            
            <div id="form-login" class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuário ou WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Sua Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-black transition shadow-lg shadow-blue-900/20">ENTRAR</button>
                <button onclick="toggleAuthMode('register')" class="text-sm text-blue-400 font-bold mt-4 block mx-auto">Não tem conta? Cadastre-se</button>
            </div>

            <div id="form-register" class="space-y-4 hidden">
                <input type="text" id="regUser" placeholder="Username" class="w-full input-dark p-4 rounded-2xl">
                <input type="text" id="regName" placeholder="Nome Completo" class="w-full input-dark p-4 rounded-2xl">
                <input type="tel" id="regWpp" placeholder="DDD + Número" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="regPass" placeholder="Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="registerApp()" class="w-full py-4 bg-green-600 rounded-2xl font-black transition">CRIAR CONTA</button>
                <button onclick="toggleAuthMode('login')" class="text-sm text-slate-400 mt-4 block mx-auto">Voltar</button>
            </div>
        </div>
    </main>

    <main id="page-otp" class="container mx-auto max-w-md mt-20 card-animate hidden">
        <div class="glass p-10 rounded-[40px] text-center border border-green-500/20">
            <i class="fab fa-whatsapp text-6xl text-green-500 mb-6"></i>
            <h2 class="text-2xl font-black mb-2">Valide seu Acesso</h2>
            <p class="text-slate-400 text-sm mb-8">O código foi enviado para o seu WhatsApp automaticamente.</p>
            <input type="text" id="otpCode" placeholder="000000" class="w-full input-dark p-4 rounded-2xl text-center text-3xl font-black tracking-widest">
            <button onclick="verifyOTP()" class="w-full py-4 bg-green-600 hover:bg-green-700 rounded-2xl font-black mt-6 transition">CONFIRMAR CÓDIGO</button>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl hidden card-animate">
        <div class="glass p-8 rounded-[32px] mb-8">
            <div class="flex gap-4 mb-6">
                <button onclick="setSearchMode('movie')" id="btn-movie" class="px-6 py-2 rounded-full text-xs font-black bg-blue-600">FILMES/SÉRIES</button>
                <button onclick="setSearchMode('tv')" id="btn-tv" class="px-6 py-2 rounded-full text-xs font-black bg-slate-800">CANAIS TV</button>
            </div>
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="O que você quer assistir hoje?" class="w-full input-dark p-5 rounded-2xl shadow-inner">
        </div>
        <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl hidden card-animate">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-blue-500">ADMIN PAINEL</h2>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="bg-green-700 px-4 py-2 rounded-xl text-[10px] font-bold">EXPORTAR CSV</button>
                <button onclick="verTodosUsuarios()" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold">LISTAR CLIENTES</button>
            </div>
        </div>
        
        <div class="grid lg:grid-cols-4 gap-6 mb-8">
            <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs uppercase font-bold">Top Pedidos</p>
                <div id="ranking-list" class="mt-4 space-y-2"></div>
            </div>
            <div class="lg:col-span-3 glass rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-slate-500 text-[10px] font-black uppercase">
                        <tr><th class="p-4">Conteúdo</th><th class="p-4">Usuário</th><th class="p-4">Status</th><th class="p-4 text-center">Ação</th></tr>
                    </thead>
                    <tbody id="admin-table" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="glass rounded-[40px] max-w-md w-full p-10 text-center border border-white/10">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-3xl mb-6 mx-auto overflow-hidden"></div>
            <h3 class="text-2xl font-black mb-6" id="modalTitle"></h3>
            <select id="requestType" class="w-full input-dark p-4 rounded-2xl mb-4">
                <option value="Adição">🎬 Solicitar Adição</option>
                <option value="Conserto">🛠️ Relatar Problema</option>
            </select>
            <textarea id="userObs" placeholder="Algum detalhe extra?" class="w-full input-dark p-4 rounded-2xl h-24 mb-6"></textarea>
            <button onclick="saveToFirebase()" class="w-full py-5 bg-blue-600 rounded-[24px] font-black hover:bg-blue-700 transition">ENVIAR SOLICITAÇÃO</button>
            <button onclick="closeModal()" class="mt-4 text-slate-500 font-bold">Fechar</button>
        </div>
    </div>

    <script>
        // --- TODAS AS FUNÇÕES RESTAURADAS ---

        function toggleAuthMode(mode) {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById(`form-${mode}`).classList.remove('hidden');
        }

        async function registerApp() {
            const username = document.getElementById('regUser').value.trim().toLowerCase();
            const nome = document.getElementById('regName').value.trim();
            const wpp = document.getElementById('regWpp').value.replace(/\D/g,'');
            const senha = document.getElementById('regPass').value;
            if(!username || !nome || wpp.length < 10) return Swal.fire('Erro', 'Dados incompletos', 'warning');
            
            const codigoOTP = Math.floor(100000 + Math.random() * 900000).toString();
            await fetch(`${USERS_URL}/${wpp}.json`, {
                method: 'PUT',
                body: JSON.stringify({ username, nome, wpp, senha, codigo: codigoOTP, verificado: false })
            });
            tempWppForOTP = wpp;
            dispararWhatsApp(wpp, codigoOTP);
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-otp').classList.remove('hidden');
        }

        async function loginApp() {
            const userInp = document.getElementById('loginUser').value.trim().toLowerCase();
            const senhaInp = document.getElementById('loginPass').value;
            const res = await fetch(`${USERS_URL}.json`);
            const users = await res.json() || {};
            const user = Object.values(users).find(u => u.username === userInp || u.wpp === userInp);
            
            if(user && user.senha === senhaInp) {
                if(!user.verificado) {
                    tempWppForOTP = user.wpp;
                    dispararWhatsApp(user.wpp, user.codigo);
                    document.getElementById('page-auth').classList.add('hidden');
                    document.getElementById('page-otp').classList.remove('hidden');
                } else {
                    currentUserLogado = user;
                    localStorage.setItem('vod_user', JSON.stringify(user));
                    ativarModoLogado();
                }
            } else { Swal.fire('Erro', 'Login inválido', 'error'); }
        }

        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            const res = await fetch(`${USERS_URL}/${tempWppForOTP}.json`);
            const user = await res.json();
            if(user && user.codigo === code) {
                await fetch(`${USERS_URL}/${tempWppForOTP}.json`, { method: 'PATCH', body: JSON.stringify({ verificado: true }) });
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
                document.getElementById('page-otp').classList.add('hidden');
            } else { Swal.fire('Erro', 'Código incorreto', 'error'); }
        }

        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `Logado como: <b>${currentUserLogado.nome}</b>`;
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
            showPage('cliente');
        }

        function showPage(p) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            if(p === 'admin') loadAdmin();
            if(p === 'status') trackRequests();
        }

        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }

        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            const type = searchMode === 'movie' ? 'multi' : 'tv';
            const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            const grid = document.getElementById('grid-content');
            grid.innerHTML = data.results.filter(i => i.poster_path).map(i => `
                <div class="glass p-3 rounded-3xl hover:scale-105 transition card-animate">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full h-56 object-cover rounded-2xl mb-3">
                    <h4 class="font-bold text-[11px] truncate mb-3 px-1">${i.title || i.name}</h4>
                    <button onclick="openModal('${(i.title || i.name).replace(/'/g, "")}', 'https://image.tmdb.org/t/p/w500${i.poster_path}')" class="w-full bg-blue-600/10 text-blue-400 py-2 rounded-xl text-[9px] font-black uppercase">Solicitar</button>
                </div>`).join('');
        }

        function openModal(name, img) {
            currentItem = { name, img };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover">`;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveToFirebase() {
            const obs = document.getElementById('userObs').value;
            const type = document.getElementById('requestType').value;
            await fetch(DATABASE_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    ...currentItem, user: currentUserLogado.nome, wpp: currentUserLogado.wpp, 
                    type, obs, status: 'Pendente', date: new Date().toLocaleString('pt-BR') 
                }) 
            });
            Swal.fire('Pronto!', 'Pedido enviado para o admin.', 'success');
            closeModal();
        }

        async function loadAdmin() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const table = document.getElementById('admin-table');
            const rankingList = document.getElementById('ranking-list');
            table.innerHTML = "";
            let ranking = {};

            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                ranking[p.name] = (ranking[p.name] || 0) + 1;
                table.innerHTML += `
                <tr class="hover:bg-white/5 transition">
                    <td class="p-4 flex gap-3 items-center">
                        <img src="${p.img}" class="w-10 h-14 rounded object-cover ${p.type==='Conserto'?'urgente':''}">
                        <div class="text-[10px] font-bold">${p.name}</div>
                    </td>
                    <td class="p-4 text-[9px] text-slate-400">${p.user}</td>
                    <td class="p-4">
                        <select onchange="updateStatus('${id}', this.value)" class="bg-slate-800 text-[9px] p-1 rounded border-none">
                            <option value="Pendente" ${p.status==='Pendente'?'selected':''}>Pendente</option>
                            <option value="Concluído" ${p.status==='Concluído'?'selected':''}>Concluído</option>
                        </select>
                    </td>
                    <td class="p-4 text-center"><button onclick="deletePedido('${id}')" class="text-slate-600"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            
            const sorted = Object.entries(ranking).sort((a,b) => b[1] - a[1]).slice(0, 5);
            rankingList.innerHTML = sorted.map(([name, count]) => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${name}</span><b>${count}x</b></div>`).join('');
        }

        async function updateStatus(id, status) {
            await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'PATCH', body: JSON.stringify({ status }) });
        }

        async function deletePedido(id) {
            await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'DELETE' });
            loadAdmin();
        }
    </script>
</body>
</html>
