<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VOD - Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg-dark: #020617; --card-dark: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); outline: none; }
        
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-pendente { background: #78350f; color: #fef3c7; }
        .status-analise { background: #1e40af; color: #dbeafe; }
        .status-concluido { background: #064e3b; color: #dcfce7; }
        .status-rejeitado { background: #7f1d1d; color: #fee2e2; }

        .card-animate { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .exit-animate { animation: slideOut 0.4s ease forwards; pointer-events: none; }
        @keyframes slideOut { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); max-height: 0; padding: 0; margin: 0; } }

        .swal2-popup { background: #0f172a !important; color: #fff !important; border: 1px solid #334155 !important; }
        
        .btn-filter { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: all 0.2s; border: 1px solid transparent; }
        .filter-todos { background: #334155; color: white; }
        .filter-analise { background: #1e40af; color: white; }
        .filter-concluido { background: #064e3b; color: white; }
        .filter-rejeitado { background: #7f1d1d; color: white; }
        .active-filter { border: 2px solid white !important; }
    </style>
</head>
<body>

    <script>
        const DB_BASE = 'https://vods-23763-default-rtdb.firebaseio.com';
        const DATABASE_URL = `${DB_BASE}/pedidos.json`;
        const USERS_URL = `${DB_BASE}/usuarios`;
        const API_KEY_TMDB = '9e64130cb366f23a3398f4f7c8e982c0';
        const ADMIN_WPP = '91988478336'; 

        // Higor, certifique-se de que estes dados batem com a sua VPS
        const WHATSAPP_API_URL = 'SUA_URL_DA_VPS'; 
        const WHATSAPP_TOKEN = 'SEU_TOKEN';

        let currentUserLogado = null;
        let searchMode = 'movie'; 
        let currentItem = {};
        let tempWppForOTP = null;
        let currentFilter = 'Todos';

        window.onload = () => {
            const saved = localStorage.getItem('vod_user');
            if(saved) { currentUserLogado = JSON.parse(saved); ativarModoLogado(); }
        };

        async function dispararWhatsApp(numero, mensagem) {
            const numLimpo = numero.replace(/\D/g, '');
            const finalNum = numLimpo.startsWith('55') ? numLimpo : '55' + numLimpo;
            
            try {
                await fetch(WHATSAPP_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${WHATSAPP_TOKEN}` },
                    body: JSON.stringify({ number: finalNum, message: mensagem })
                });
            } catch (e) { console.error("Erro no disparo:", e); }
        }
    </script>

    <header id="main-header" class="container mx-auto flex flex-col md:flex-row justify-between items-center p-6 mb-8 gap-6 hidden">
        <h1 class="text-4xl font-black text-blue-500">PORTAL<span class="text-white">VOD</span></h1>
        <nav class="flex gap-2 glass p-2 rounded-2xl">
            <button onclick="showPage('cliente')" class="px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-700 transition">Início</button>
            <button onclick="showPage('status')" class="px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-700 transition">Meus Pedidos</button>
            <button id="btn-nav-admin" onclick="showPage('admin')" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 hidden">Admin</button>
            <button onclick="logoutApp()" class="px-4 py-2 rounded-xl text-sm font-bold text-red-400 hover:bg-red-900/30 transition">Sair</button>
        </nav>
    </header>

    <main id="page-auth" class="container mx-auto max-w-md mt-20 p-4">
        <div class="glass p-10 rounded-[40px] text-center">
            <h1 class="text-4xl font-black text-blue-500 mb-8">PORTAL<span class="text-white">VOD</span></h1>
            
            <div id="form-login" class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuário ou WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="loginPass" placeholder="Sua Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="loginApp()" class="w-full py-4 bg-blue-600 rounded-2xl font-black shadow-lg">ENTRAR</button>
                <div class="flex justify-between mt-4">
                    <button onclick="toggleAuthMode('forgot')" class="text-xs text-slate-500">Esqueceu sua senha?</button>
                    <button onclick="toggleAuthMode('register')" class="text-xs text-blue-400 font-bold">Criar conta</button>
                </div>
            </div>

            <div id="form-register" class="space-y-4 hidden">
                <input type="text" id="regUser" placeholder="Usuário" class="w-full input-dark p-4 rounded-2xl">
                <input type="text" id="regName" placeholder="Nome Completo" class="w-full input-dark p-4 rounded-2xl">
                <input type="tel" id="regWpp" placeholder="DDD + Número" class="w-full input-dark p-4 rounded-2xl">
                <input type="password" id="regPass" placeholder="Senha" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="registerApp()" class="w-full py-4 bg-green-600 rounded-2xl font-black">CADASTRAR E VALIDAR</button>
                <button onclick="toggleAuthMode('login')" class="text-sm text-slate-400 mt-4 block mx-auto">Voltar</button>
            </div>

            <div id="form-forgot" class="space-y-4 hidden">
                <h3 class="font-bold text-sm mb-2 text-yellow-500">Recuperar Acesso</h3>
                <input type="tel" id="forgotWpp" placeholder="Seu WhatsApp" class="w-full input-dark p-4 rounded-2xl">
                <button onclick="forgotPassword()" class="w-full py-4 bg-yellow-600 rounded-2xl font-black text-black">ENVIAR CÓDIGO</button>
                <button onclick="toggleAuthMode('login')" class="text-sm text-slate-400 mt-4 block mx-auto">Voltar</button>
            </div>
        </div>
    </main>

    <main id="page-otp" class="container mx-auto max-w-md mt-20 p-4 hidden">
        <div class="glass p-10 rounded-[40px] text-center">
            <i class="fab fa-whatsapp text-6xl text-green-500 mb-6"></i>
            <h2 class="text-2xl font-black mb-2">Valide seu WhatsApp</h2>
            <p class="text-xs text-slate-400 mb-6">Digite o código enviado para concluir.</p>
            <input type="text" id="otpCode" placeholder="000000" class="w-full input-dark p-4 rounded-2xl text-center text-3xl font-black tracking-widest">
            <button onclick="verifyOTP()" class="w-full py-4 bg-green-600 rounded-2xl font-black mt-6">CONCLUIR</button>
            <button onclick="reenviarOTP()" class="mt-4 text-blue-400 text-xs font-bold underline">Reenviar código</button>
        </div>
    </main>

    <main id="page-cliente" class="container mx-auto max-w-6xl p-6 hidden">
        <div class="glass p-8 rounded-[32px] mb-8">
            <div class="flex gap-4 mb-6">
                <button onclick="setSearchMode('movie')" id="btn-movie" class="px-6 py-2 rounded-full text-xs font-black bg-blue-600 transition-all">FILMES/SÉRIES</button>
                <button onclick="setSearchMode('tv')" id="btn-tv" class="px-6 py-2 rounded-full text-xs font-black bg-slate-800 transition-all">CANAIS DE TV</button>
            </div>
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Pesquisar conteúdo..." class="w-full input-dark p-5 rounded-2xl">
        </div>
        <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <main id="page-status" class="container mx-auto max-w-2xl p-6 hidden">
        <h2 class="text-3xl font-black mb-8">Meus Pedidos</h2>
        <div id="track-results" class="space-y-4"></div>
    </main>

    <main id="page-admin" class="container mx-auto max-w-7xl p-6 hidden">
        <div class="grid lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-black text-blue-400 uppercase">Top 10 Pedidos</h3>
                        <button onclick="zerarRanking()" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded hover:bg-red-600 hover:text-white transition">Zerar</button>
                    </div>
                    <div id="ranking-list" class="space-y-2"></div>
                </div>
                <button onclick="abrirModalClientes()" class="w-full bg-blue-600 py-3 rounded-2xl font-black text-xs">LISTA DE CLIENTES</button>
            </div>

            <div class="lg:col-span-3">
                <div class="flex flex-wrap gap-2 mb-4">
                    <button onclick="filterAdmin('Todos')" id="f-Todos" class="btn-filter filter-todos active-filter">Todos</button>
                    <button onclick="filterAdmin('Análise')" id="f-Análise" class="btn-filter filter-analise">Análise</button>
                    <button onclick="filterAdmin('Concluído')" id="f-Concluído" class="btn-filter filter-concluido">Concluído</button>
                    <button onclick="filterAdmin('Rejeitado')" id="f-Rejeitado" class="btn-filter filter-rejeitado">Rejeitados</button>
                </div>

                <div class="glass rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/50 text-slate-500 text-[10px] font-black uppercase">
                            <tr>
                                <th class="p-4">Conteúdo</th>
                                <th class="p-4">Cliente / WhatsApp</th>
                                <th class="p-4">Data / Hora</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="glass rounded-[40px] max-w-md w-full p-10 text-center">
            <div id="modal-poster" class="w-32 h-44 bg-slate-800 rounded-3xl mb-6 mx-auto overflow-hidden"></div>
            <h3 class="text-2xl font-black mb-6" id="modalTitle"></h3>
            
            <div class="space-y-4 text-left">
                <select id="requestType" class="w-full input-dark p-4 rounded-2xl">
                    <option value="🍿 Solicitar adição">🍿 Solicitar adição</option>
                    <option value="🎬 Solicitar atualização">🎬 Solicitar atualização</option>
                    <option value="👨🏻‍🔧 Relatar um problema">👨🏻‍🔧 Relatar um problema</option>
                </select>
                <label class="text-[10px] font-bold text-slate-500 uppercase px-2">Anexar Foto (Opcional)</label>
                <input type="file" id="userPhoto" accept="image/*" class="w-full text-xs text-slate-400 file:bg-blue-600 file:rounded-full file:border-0 cursor-pointer">
                <textarea id="userObs" placeholder="Algum detalhe extra?" class="w-full input-dark p-4 rounded-2xl h-24"></textarea>
            </div>
            <button onclick="saveToFirebase()" class="w-full py-5 bg-blue-600 rounded-[24px] font-black mt-6">ENVIAR</button>
            <button onclick="closeModal()" class="mt-4 text-slate-500 block w-full">Cancelar</button>
        </div>
    </div>

    <script>
        async function registerApp() {
            const wpp = document.getElementById('regWpp').value.replace(/\D/g,'');
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const data = { 
                username: document.getElementById('regUser').value,
                nome: document.getElementById('regName').value,
                wpp: wpp,
                senha: document.getElementById('regPass').value,
                codigo: code,
                verificado: false 
            };
            await fetch(`${USERS_URL}/${wpp}.json`, { method: 'PUT', body: JSON.stringify(data) });
            tempWppForOTP = wpp;
            await dispararWhatsApp(wpp, `Seu código Portal VOD: ${code}`);
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-otp').classList.remove('hidden');
        }

        async function reenviarOTP() {
            if(!tempWppForOTP) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            await fetch(`${USERS_URL}/${tempWppForOTP}.json`, { method: 'PATCH', body: JSON.stringify({ codigo: code }) });
            await dispararWhatsApp(tempWppForOTP, `Seu novo código Portal VOD: ${code}`);
            Swal.fire({ icon: 'success', title: 'Código reenviado!', toast: true, position: 'top', showConfirmButton: false, timer: 2000 });
        }

        async function verifyOTP() {
            const codeInp = document.getElementById('otpCode').value;
            const res = await fetch(`${USERS_URL}/${tempWppForOTP}.json`);
            const user = await res.json();
            if(user && user.codigo === codeInp) {
                await fetch(`${USERS_URL}/${tempWppForOTP}.json`, { method: 'PATCH', body: JSON.stringify({ verificado: true }) });
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
            } else { Swal.fire('Erro', 'Código incorreto!', 'error'); }
        }

        async function loginApp() {
            const userInp = document.getElementById('loginUser').value.trim();
            const passInp = document.getElementById('loginPass').value;
            const res = await fetch(`${USERS_URL}.json`);
            const users = await res.json() || {};
            const user = Object.values(users).find(u => (u.username === userInp || u.wpp === userInp) && u.senha === passInp);
            if(user) {
                if(!user.verificado) {
                    tempWppForOTP = user.wpp;
                    await reenviarOTP();
                    document.getElementById('page-auth').classList.add('hidden');
                    document.getElementById('page-otp').classList.remove('hidden');
                    return;
                }
                currentUserLogado = user;
                localStorage.setItem('vod_user', JSON.stringify(user));
                ativarModoLogado();
            } else { Swal.fire('Erro', 'Dados incorretos!', 'error'); }
        }

        function filterAdmin(status) {
            currentFilter = status;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active-filter'));
            document.getElementById(`f-${status}`).classList.add('active-filter');
            loadAdmin();
        }

        async function loadAdmin() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const table = document.getElementById('admin-table');
            const rankingList = document.getElementById('ranking-list');
            let ranking = {};
            let keys = Object.keys(data).reverse();
            if (currentFilter !== 'Todos') keys = keys.filter(id => data[id].status === currentFilter);

            table.innerHTML = keys.map(id => {
                const p = data[id];
                ranking[p.name] = (ranking[p.name] || 0) + 1;
                return `
                <tr id="row-${id}" class="hover:bg-white/5 transition">
                    <td class="p-4 flex gap-4 items-center">
                        <img src="${p.img}" class="w-10 h-14 rounded object-cover">
                        <div class="text-[11px] font-bold">
                            ${p.name} ${p.photo ? `<br><button onclick="Swal.fire({imageUrl: '${p.photo}', background: '#0f172a'})" class="text-blue-400 text-[8px]">Ver Foto</button>` : ''}
                        </div>
                    </td>
                    <td class="p-4 text-[10px]"><b>${p.user}</b><br>${p.wpp}</td>
                    <td class="p-4 text-[10px] text-slate-400">${p.date}<br>${p.hour}</td>
                    <td class="p-4">
                        <select onchange="updateStatus('${id}', this.value, '${p.wpp}', '${p.name}')" class="bg-slate-800 text-[10px] p-2 rounded-lg outline-none">
                            <option value="Pendente" ${p.status==='Pendente'?'selected':''}>Pendente</option>
                            <option value="Análise" ${p.status==='Análise'?'selected':''}>Análise</option>
                            <option value="Concluído" ${p.status==='Concluído'?'selected':''}>Concluído</option>
                            <option value="Rejeitado" ${p.status==='Rejeitado'?'selected':''}>Rejeitado</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deletePedido('${id}')" class="text-slate-600 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');

            const sorted = Object.entries(ranking).sort((a,b) => b[1] - a[1]).slice(0, 10);
            rankingList.innerHTML = sorted.map(([name, count]) => `<div class="flex justify-between p-3 bg-white/5 rounded-xl text-[11px] font-bold"><span>${name}</span><b class="text-blue-400">${count}x</b></div>`).join('');
        }

        async function updateStatus(id, status, wpp, contentName) {
            await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'PATCH', body: JSON.stringify({ status }) });
            await dispararWhatsApp(wpp, `Olá! Seu pedido de "${contentName}" foi atualizado para: ${status.toUpperCase()}`);
            loadAdmin(); 
        }

        async function saveToFirebase() {
            const fileInput = document.getElementById('userPhoto');
            let photoBase64 = null;
            if (fileInput.files.length > 0) {
                photoBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }
            const data = { 
                ...currentItem, user: currentUserLogado.nome, wpp: currentUserLogado.wpp, 
                type: document.getElementById('requestType').value,
                obs: document.getElementById('userObs').value, photo: photoBase64,
                status: 'Pendente', date: new Date().toLocaleDateString('pt-BR'), hour: new Date().toLocaleTimeString('pt-BR')
            };
            await fetch(DATABASE_URL, { method: 'POST', body: JSON.stringify(data) });
            await dispararWhatsApp(ADMIN_WPP, `NOVA SOLICITAÇÃO: ${currentUserLogado.nome} pediu ${currentItem.name}`);
            Swal.fire('Enviado!', '', 'success');
            closeModal();
        }

        // Funções de Interface
        function toggleAuthMode(m) {
            document.querySelectorAll('#form-login, #form-register, #form-forgot').forEach(f => f.classList.add('hidden'));
            document.getElementById(`form-${m}`).classList.remove('hidden');
        }
        function ativarModoLogado() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-otp').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            if(currentUserLogado.wpp === ADMIN_WPP) document.getElementById('btn-nav-admin').classList.remove('hidden');
            showPage('cliente');
        }
        function showPage(p) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            if(p === 'admin') loadAdmin();
            if(p === 'status') trackRequests();
        }
        async function handleSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/${searchMode==='movie'?'multi':'tv'}?api_key=${API_KEY_TMDB}&language=pt-BR&query=${q}`);
            const data = await res.json();
            document.getElementById('grid-content').innerHTML = data.results.filter(i => i.poster_path).map(i => `
                <div class="glass p-4 rounded-3xl hover:scale-105 transition card-animate">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full h-56 object-cover rounded-2xl mb-4">
                    <h4 class="font-bold text-xs truncate mb-4">${i.title || i.name}</h4>
                    <button onclick="openModal('${(i.title || i.name).replace(/'/g, "")}', 'https://image.tmdb.org/t/p/w500${i.poster_path}')" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-black uppercase">Solicitar</button>
                </div>`).join('');
        }
        function setSearchMode(m) {
            searchMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'px-6 py-2 rounded-full text-xs font-black bg-blue-600' : 'px-6 py-2 rounded-full text-xs font-black bg-slate-800';
            document.getElementById('btn-tv').className = m === 'tv' ? 'px-6 py-2 rounded-full text-xs font-black bg-blue-600' : 'px-6 py-2 rounded-full text-xs font-black bg-slate-800';
        }
        async function trackRequests() {
            const res = await fetch(DATABASE_URL);
            const data = await res.json() || {};
            const list = Object.values(data).filter(p => p.wpp === currentUserLogado.wpp).reverse();
            document.getElementById('track-results').innerHTML = list.map(p => `
                <div class="glass p-5 rounded-3xl flex items-center gap-4">
                    <img src="${p.img}" class="w-14 h-20 rounded-xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-white text-sm">${p.name}</h4>
                        <span class="status-badge status-${p.status.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")}">${p.status}</span>
                    </div>
                </div>`).join('');
        }
        async function deletePedido(id) {
            const row = document.getElementById(`row-${id}`);
            row.classList.add('exit-animate');
            setTimeout(async () => {
                await fetch(DATABASE_URL.replace('.json', `/${id}.json`), { method: 'DELETE' });
                loadAdmin();
            }, 400);
        }
        async function zerarRanking() {
            const confirm = await Swal.fire({ title: 'Zerar?', icon: 'warning', showCancelButton: true });
            if(confirm.isConfirmed) { await fetch(DATABASE_URL, { method: 'DELETE' }); loadAdmin(); }
        }
        async function abrirModalClientes() {
            const res = await fetch(`${USERS_URL}.json`);
            const users = await res.json() || {};
            let html = Object.keys(users).map(wpp => `
                <div id="user-row-${wpp}" class="flex justify-between items-center p-3 border-b border-white/5">
                    <div class="text-left"><p class="text-sm font-bold text-white">${users[wpp].nome}</p><p class="text-xs text-slate-500">${wpp}</p></div>
                    <button onclick="excluirUsuario('${wpp}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>`).join('');
            Swal.fire({ title: 'Clientes', html: `<div class="max-h-96 overflow-y-auto">${html}</div>`, showConfirmButton: false });
        }
        async function excluirUsuario(wpp) {
            const row = document.getElementById(`user-row-${wpp}`);
            row.classList.add('exit-animate');
            setTimeout(async () => {
                await fetch(`${USERS_URL}/${wpp}.json`, { method: 'DELETE' });
                abrirModalClientes();
            }, 400);
        }
        async function forgotPassword() {
            const wpp = document.getElementById('forgotWpp').value.replace(/\D/g,'');
            const res = await fetch(`${USERS_URL}/${wpp}.json`);
            const user = await res.json();
            if(user) {
                tempWppForOTP = wpp;
                await reenviarOTP();
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('page-otp').classList.remove('hidden');
            } else { Swal.fire('Erro', 'Número não encontrado!', 'error'); }
        }
        function openModal(name, img) { currentItem = { name, img }; document.getElementById('modalTitle').innerText = name; document.getElementById('modal-poster').innerHTML = `<img src="${img}" class="w-full h-full object-cover">`; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function logoutApp() { localStorage.removeItem('vod_user'); location.reload(); }
    </script>
</body>
</html>
